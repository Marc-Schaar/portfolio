<header>
  <div class="container max-width">
    <a routerLink="" (click)="scroll()">
      <h2>Marc</h2>
    </a>

    <nav>
      <a href="#about-me">{{ "aboutMe.title" | translate }}</a>
      <a href="#skills">{{ "skills.title" | translate }}</a>
      <a href="#portfolio">Portfolio</a>
      <div class="row">
        <ng-container *ngFor="let lang of languages; let last = last">
          <button
            [class.underline]="currentLang === lang"
            (click)="changeLanguage(lang)"
          >
            {{ lang }}
          </button>
          <div class="divider" *ngIf="!last"></div>
        </ng-container>
      </div>
    </nav>

    <div class="menu-icon" [class.open]="isOpen">
      <svg
        (click)="toggleMenu()"
        width="40"
        height="30"
        viewBox="0 0 40 30"
        xmlns="http://www.w3.org/2000/svg"
      >
        <line x1="5" y1="7" x2="35" y2="7" class="line top"></line>
        <line x1="5" y1="15" x2="35" y2="15" class="line middle"></line>
        <line x1="5" y1="23" x2="35" y2="23" class="line bottom"></line>
      </svg>
    </div>
  </div>
</header>

<main [ngClass]="{ 'full-height': isOpen }">
  <nav [class.open]="isOpen">
    <a (click)="toggleMenu()" href="#about-me">{{
      "aboutMe.title" | translate
    }}</a>
    <a (click)="toggleMenu()" href="#skills">{{
      "skills.title" | translate
    }}</a>
    <a (click)="toggleMenu()" href="#portfolio">Portfolio</a>
    <div class="language-btns">
      <ng-container *ngFor="let lang of languages; let last = last">
        <button
          [class.underline]="currentLang === lang"
          (click)="changeLanguage(lang); toggleMenu()"
        >
          {{ lang }}
        </button>
        <div class="divider" *ngIf="!last"></div>
      </ng-container>
    </div>
  </nav>
</main>
